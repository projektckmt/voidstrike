model_list:
  # HIGH tier
  - model_name: anthropic/claude-opus-4-8
    litellm_params:
      model: claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: openai/gpt-5
    litellm_params:
      model: gpt-5
      api_key: os.environ/OPENAI_API_KEY
  - model_name: google/gemini-3-pro
    litellm_params:
      model: gemini/gemini-3-pro
      api_key: os.environ/GOOGLE_API_KEY

  # MID tier
  - model_name: anthropic/claude-sonnet-4-6
    litellm_params:
      model: claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: openai/gpt-5-mini
    litellm_params:
      model: gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: google/gemini-flash
    litellm_params:
      model: gemini/gemini-flash
      api_key: os.environ/GOOGLE_API_KEY

  # LOW tier
  - model_name: anthropic/claude-haiku-4-5
    litellm_params:
      model: claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: openai/gpt-5-nano
    litellm_params:
      model: gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY
  - model_name: ollama/qwen3-32b
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://host.docker.internal:11434

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - anthropic/claude-opus-4-8: [openai/gpt-5, google/gemini-3-pro]
    - openai/gpt-5: [anthropic/claude-opus-4-8, google/gemini-3-pro]
    - anthropic/claude-sonnet-4-6: [openai/gpt-5-mini, google/gemini-flash]
    - anthropic/claude-haiku-4-5: [openai/gpt-5-nano, ollama/qwen3-32b]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
  drop_params: true
  set_verbose: false
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  budget_duration: "1d"
