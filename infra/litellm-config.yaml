model_list:
  # HIGH tier
  - model_name: anthropic/claude-opus-4-8
    litellm_params:
      model: claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: openai/gpt-5.5
    litellm_params:
      model: gpt-5.5
      api_key: os.environ/OPENAI_API_KEY
  - model_name: google/gemini-3-pro
    litellm_params:
      model: gemini/gemini-3-pro
      api_key: os.environ/GOOGLE_API_KEY

  # MID tier
  - model_name: anthropic/claude-sonnet-4-6
    litellm_params:
      model: claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: openai/gpt-5.4-mini
    litellm_params:
      model: gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: google/gemini-flash
    litellm_params:
      model: gemini/gemini-flash
      api_key: os.environ/GOOGLE_API_KEY

  # LOW tier
  - model_name: anthropic/claude-haiku-4-5
    litellm_params:
      model: claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: openai/gpt-5.4-nano
    litellm_params:
      model: gpt-5.4-nano
      api_key: os.environ/OPENAI_API_KEY
  - model_name: ollama/qwen3-32b
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://host.docker.internal:11434

  # OpenRouter — the `qwen` profile. `reasoning.enabled=false` turns off Qwen's
  # default thinking mode, which otherwise rejects the forced tool_choice our
  # structured output relies on (a hard 400). Passed via extra_body so the global
  # `drop_params: true` can't strip it (verified: it forwards to OpenRouter and
  # forced tool_choice then succeeds).
  - model_name: openrouter/qwen/qwen3.7-max
    litellm_params:
      model: openrouter/qwen/qwen3.7-max
      api_key: os.environ/OPENROUTER_API_KEY
      extra_body:
        reasoning:
          enabled: false

  # Embeddings — Graphiti's cross-engagement memory embedder routes here. Uses
  # the native OpenAI key when present; if OPENAI_API_KEY is unset the bootstrap
  # remaps it to OpenRouter (which also serves text-embedding-3-large), so the
  # same `openai/text-embedding-3-large` slug + 3072-dim vectors hold on either
  # path. Keep one embedding model graph-wide — mixing dims breaks vector search.
  - model_name: openai/text-embedding-3-large
    litellm_params:
      model: text-embedding-3-large
      api_key: os.environ/OPENAI_API_KEY
  # Cheaper 1536-dim alternative (~5x less). Switch via GRAPHITI_EMBED_MODEL, but
  # only on a fresh graph — you can't mix embedding dims within one graph.
  - model_name: openai/text-embedding-3-small
    litellm_params:
      model: text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - anthropic/claude-opus-4-8: [openai/gpt-5.5, google/gemini-3-pro]
    - openai/gpt-5.5: [anthropic/claude-opus-4-8, google/gemini-3-pro]
    - anthropic/claude-sonnet-4-6: [openai/gpt-5.4-mini, google/gemini-flash]
    - anthropic/claude-haiku-4-5: [openai/gpt-5.4-nano, ollama/qwen3-32b]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
  drop_params: true
  set_verbose: false
  # Langfuse observability is opt-in: uncomment after setting LANGFUSE_PUBLIC_KEY
  # / LANGFUSE_SECRET_KEY in .env (the project ships LangSmith, not Langfuse, so
  # these aren't set by default and an empty-key callback errors per request).
  # success_callback: ["langfuse"]
  # failure_callback: ["langfuse"]
  budget_duration: "1d"
