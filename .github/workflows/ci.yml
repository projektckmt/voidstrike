name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      # Install the package + dev extras so test modules that import
      # langchain_core / httpx / mcp resolve (the suite stubs the LLM, but those
      # imports are real). Matches the local `pip install -e ".[dev]"` workflow.
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/unit/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet ruff
      - run: ruff check src/ tests/
